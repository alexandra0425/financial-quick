<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>FinQA · 金融资产问答系统</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d0d14;
  --surface: #16161f;
  --surface2: #1e1e2a;
  --border: #2a2a3a;
  --accent: #6c63ff;
  --accent2: #a78bfa;
  --green: #22c55e;
  --red: #ef4444;
  --text: #e8e8f2;
  --text2: #8888aa;
  --gold: #f59e0b;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Header */
.header {
  padding: 14px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  align-items: center;
  gap: 16px;
  flex-shrink: 0;
}
.logo {
  font-size: 18px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.tagline {
  font-size: 12px;
  color: var(--text2);
}
.status-dot {
  width: 8px; height: 8px;
  background: var(--green);
  border-radius: 50%;
  box-shadow: 0 0 6px var(--green);
  margin-left: auto;
}

/* Layout */
.main { display: flex; flex: 1; overflow: hidden; }

/* Sidebar */
.sidebar {
  width: 260px;
  border-right: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  flex-shrink: 0;
}
.sidebar-section { padding: 16px; border-bottom: 1px solid var(--border); }
.section-title {
  font-size: 11px;
  font-weight: 600;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 10px;
}
.quick-btn {
  display: block;
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 9px 12px;
  font-size: 12px;
  color: var(--text2);
  cursor: pointer;
  margin-bottom: 6px;
  text-align: left;
  transition: all 0.15s;
  line-height: 1.4;
}
.quick-btn:hover { border-color: var(--accent); color: var(--text); background: rgba(108,99,255,0.08); }

.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 10px;
  font-weight: 600;
  margin-bottom: 4px;
}
.badge.market { background: rgba(34,197,94,0.15); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
.badge.knowledge { background: rgba(108,99,255,0.15); color: var(--accent2); border: 1px solid rgba(108,99,255,0.3); }
.badge.both { background: rgba(245,158,11,0.15); color: var(--gold); border: 1px solid rgba(245,158,11,0.3); }

/* Chat */
.chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.chat-header {
  padding: 14px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.chat-icon {
  width: 34px; height: 34px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
}
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px 24px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* Message bubbles */
.msg { display: flex; gap: 12px; animation: fadeIn 0.2s ease; }
.msg.user { flex-direction: row-reverse; }
.msg-av {
  width: 32px; height: 32px;
  border-radius: 8px;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
}
.msg-av.ai { background: linear-gradient(135deg, var(--accent), var(--accent2)); }
.msg-av.user-av { background: linear-gradient(135deg, #ec4899, #f97316); font-size: 12px; font-weight: 700; color: #fff; }
.msg-body { max-width: calc(100% - 44px); }
.msg-label { font-size: 11px; color: var(--text2); margin-bottom: 5px; font-weight: 500; }
.msg.user .msg-label { text-align: right; }
.msg-bubble {
  padding: 12px 16px;
  border-radius: 12px;
  font-size: 14px;
  line-height: 1.65;
}
.msg.user .msg-bubble {
  background: linear-gradient(135deg, rgba(108,99,255,0.2), rgba(167,139,250,0.12));
  border: 1px solid rgba(108,99,255,0.3);
  border-radius: 12px 4px 12px 12px;
}
.msg.ai .msg-bubble {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px 12px 12px 12px;
}

/* Markdown */
.msg-bubble h1, .msg-bubble h2 { font-size: 15px; font-weight: 600; color: var(--accent2); margin: 12px 0 6px; }
.msg-bubble h3 { font-size: 14px; font-weight: 600; margin: 10px 0 5px; }
.msg-bubble p { margin-bottom: 8px; }
.msg-bubble p:last-child { margin-bottom: 0; }
.msg-bubble ul, .msg-bubble ol { padding-left: 18px; margin-bottom: 8px; }
.msg-bubble li { margin-bottom: 3px; }
.msg-bubble strong { color: var(--accent2); }
.msg-bubble code { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 1px 5px; font-size: 12px; font-family: monospace; }
.msg-bubble blockquote { border-left: 3px solid var(--accent); padding-left: 12px; color: var(--text2); margin: 8px 0; }
.msg-bubble a { color: var(--accent2); }
.msg-bubble hr { border: none; border-top: 1px solid var(--border); margin: 10px 0; }
.msg-bubble table { width: 100%; border-collapse: collapse; font-size: 13px; margin: 8px 0; }
.msg-bubble th { background: var(--surface2); padding: 6px 10px; text-align: left; border: 1px solid var(--border); }
.msg-bubble td { padding: 5px 10px; border: 1px solid var(--border); }

/* Meta tag */
.meta-tag {
  display: flex;
  gap: 6px;
  margin-top: 8px;
  flex-wrap: wrap;
}

/* Step chips */
.steps { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
.step {
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  border: 1px solid var(--border);
  color: var(--text2);
  background: var(--surface2);
  display: flex; align-items: center; gap: 4px;
  transition: all 0.3s;
}
.step.active { border-color: var(--accent); color: var(--accent2); background: rgba(108,99,255,0.1); }
.step.done { border-color: var(--green); color: var(--green); background: rgba(34,197,94,0.08); }
.spin { width: 10px; height: 10px; border: 1.5px solid currentColor; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; }

/* Typing */
.typing { display: flex; gap: 4px; align-items: center; }
.typing span { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: bounce 1.2s ease-in-out infinite; }
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }

/* Welcome */
.welcome { text-align: center; padding: 50px 20px; }
.welcome-icon { font-size: 52px; margin-bottom: 16px; }
.welcome h2 { font-size: 22px; font-weight: 600; margin-bottom: 8px; }
.welcome p { font-size: 14px; color: var(--text2); line-height: 1.6; }

/* Input */
.input-area {
  padding: 16px 24px 20px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.input-wrap {
  display: flex;
  align-items: flex-end;
  gap: 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 10px 12px;
  transition: border-color 0.2s;
}
.input-wrap:focus-within { border-color: var(--accent); }
.input-wrap textarea {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  color: var(--text);
  font-size: 14px;
  resize: none;
  max-height: 120px;
  line-height: 1.5;
  font-family: inherit;
}
.input-wrap textarea::placeholder { color: var(--text2); }
.send-btn {
  width: 34px; height: 34px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none;
  border-radius: 8px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: opacity 0.2s, transform 0.1s;
}
.send-btn:hover { opacity: 0.9; transform: scale(1.05); }
.send-btn svg { width: 16px; height: 16px; fill: white; }
.disclaimer { font-size: 11px; color: var(--text2); text-align: center; margin-top: 8px; opacity: 0.5; }

@keyframes spin { to { transform: rotate(360deg); } }
@keyframes bounce { 0%,80%,100%{transform:translateY(0);opacity:.4} 40%{transform:translateY(-5px);opacity:1} }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="logo">FinQA</div>
    <div class="tagline">金融资产智能问答系统</div>
  </div>
  <div class="status-dot" id="statusDot" title="后端连接中..."></div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="section-title">行情类问题</div>
      <button class="quick-btn" onclick="ask('阿里巴巴当前股价是多少？')">阿里巴巴当前股价是多少？</button>
      <button class="quick-btn" onclick="ask('BABA 最近7天涨跌情况如何？')">BABA 最近7天涨跌情况？</button>
      <button class="quick-btn" onclick="ask('特斯拉近期走势如何？')">特斯拉近期走势如何？</button>
      <button class="quick-btn" onclick="ask('英伟达最近30天表现如何？')">英伟达最近30天表现？</button>
    </div>
    <div class="sidebar-section">
      <div class="section-title">知识类问题</div>
      <button class="quick-btn" onclick="ask('什么是市盈率？')">什么是市盈率？</button>
      <button class="quick-btn" onclick="ask('收入和净利润的区别是什么？')">收入和净利润的区别？</button>
      <button class="quick-btn" onclick="ask('什么是自由现金流？')">什么是自由现金流？</button>
      <button class="quick-btn" onclick="ask('什么是Beta值？')">什么是Beta值？</button>
    </div>
    <div class="sidebar-section">
      <div class="section-title">系统说明</div>
      <div style="font-size: 12px; color: var(--text2); line-height: 1.6;">
        <div style="margin-bottom: 6px;"><span class="badge market">行情</span> 实时调用 Yahoo Finance API</div>
        <div style="margin-bottom: 6px;"><span class="badge knowledge">知识</span> RAG 向量检索金融知识库</div>
        <div><span class="badge both">综合</span> 数据 + 知识双路并行</div>
      </div>
    </div>
  </div>

  <div class="chat-area">
    <div class="chat-header">
      <div class="chat-icon">📊</div>
      <div>
        <div style="font-size: 15px; font-weight: 600;">金融问答助手</div>
        <div style="font-size: 12px; color: var(--text2);" id="serverStatus">正在连接后端...</div>
      </div>
    </div>

    <div class="messages" id="messages">
      <div class="welcome">
        <div class="welcome-icon">📈</div>
        <h2>欢迎使用 FinQA</h2>
        <p>你可以问我资产价格、涨跌分析、金融知识等问题。<br/>系统会自动路由到行情数据或知识库获取准确答案。</p>
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrap">
        <textarea id="input" rows="1" placeholder="输入问题，如：阿里巴巴最近7天涨跌情况如何？"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" onclick="sendMsg()">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
      <div class="disclaimer">数据来源：Yahoo Finance / 金融知识库 · 内容仅供参考，不构成投资建议</div>
    </div>
  </div>
</div>

<script>
const API = 'http://localhost:5001';
let isLoading = false;
const history = [];

// 检查后端状态
async function checkHealth() {
  try {
    const r = await fetch(`${API}/api/health`);
    const d = await r.json();
    document.getElementById('serverStatus').textContent = '后端已连接 · 就绪';
    document.getElementById('statusDot').style.background = '#22c55e';
  } catch {
    document.getElementById('serverStatus').textContent = '后端未连接 · 请启动 backend/main.py';
    document.getElementById('statusDot').style.background = '#ef4444';
  }
}
checkHealth();

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
}

function ask(q) {
  document.getElementById('input').value = q;
  sendMsg();
}

function scrollBottom() {
  const el = document.getElementById('messages');
  el.scrollTop = el.scrollHeight;
}

function removeWelcome() {
  const w = document.querySelector('.welcome');
  if (w) w.remove();
}

function addUserMsg(text) {
  removeWelcome();
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `
    <div class="msg-av user-av">我</div>
    <div class="msg-body">
      <div class="msg-label">你</div>
      <div class="msg-bubble">${text}</div>
    </div>`;
  container.appendChild(div);
  scrollBottom();
}

function addTyping() {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.id = 'typing';
  div.innerHTML = `
    <div class="msg-av ai">📊</div>
    <div class="msg-body">
      <div class="steps" id="steps">
        <div class="step active" id="s0"><span class="spin"></span>意图识别</div>
        <div class="step" id="s1">数据获取</div>
        <div class="step" id="s2">知识检索</div>
        <div class="step" id="s3">生成回答</div>
      </div>
      <div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>
    </div>`;
  container.appendChild(div);
  scrollBottom();

  let i = 0;
  const labels = ['意图识别', '数据获取', '知识检索', '生成回答'];
  const interval = setInterval(() => {
    const cur = document.getElementById(`s${i}`);
    if (cur) { cur.className = 'step done'; cur.textContent = `✓ ${labels[i]}`; }
    i++;
    if (i < labels.length) {
      const next = document.getElementById(`s${i}`);
      if (next) next.className = 'step active';
    }
    if (i >= labels.length) clearInterval(interval);
  }, 700);
  return interval;
}

let chartCount = 0;

function addAiMsg(answer, meta) {
  const container = document.getElementById('messages');
  const typing = document.getElementById('typing');
  if (typing) typing.remove();

  const div = document.createElement('div');
  div.className = 'msg ai';

  const typeMap = { market: '行情', knowledge: '知识', both: '综合' };
  const typeClass = meta?.query_type || 'market';
  const typeLabel = typeMap[typeClass] || '行情';

  // 走势图
  let chartHtml = '';
  const chartData = meta?.chart_data;
  if (chartData && chartData.length > 1) {
    chartCount++;
    const cid = `chart-${chartCount}`;
    chartHtml = `<div style="margin-top:12px;padding:12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;">
      <div style="font-size:11px;color:var(--text2);margin-bottom:8px;">📈 ${meta.symbol} 价格走势</div>
      <canvas id="${cid}" height="120"></canvas>
    </div>`;
  }

  let metaHtml = `<div class="meta-tag">
    <span class="badge ${typeClass}">${typeLabel}</span>
    ${meta?.symbol ? `<span class="badge market">📈 ${meta.symbol}</span>` : ''}
    ${meta?.rag_used ? `<span class="badge knowledge">📚 RAG</span>` : ''}
  </div>`;

  div.innerHTML = `
    <div class="msg-av ai">📊</div>
    <div class="msg-body">
      <div class="msg-label">FinQA</div>
      <div class="msg-bubble">${marked.parse(answer)}${chartHtml}${metaHtml}</div>
    </div>`;
  container.appendChild(div);

  // 渲染图表
  if (chartData && chartData.length > 1) {
    const cid = `chart-${chartCount}`;
    const labels = chartData.map(p => p.date.slice(5)); // MM-DD
    const prices = chartData.map(p => p.close);
    const isUp = prices[prices.length-1] >= prices[0];
    const color = isUp ? '#22c55e' : '#ef4444';

    new Chart(document.getElementById(cid), {
      type: 'line',
      data: {
        labels,
        datasets: [{
          data: prices,
          borderColor: color,
          backgroundColor: color + '18',
          borderWidth: 2,
          pointRadius: 3,
          fill: true,
          tension: 0.3,
        }]
      },
      options: {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { color: '#8888aa', font: { size: 10 } }, grid: { color: '#2a2a3a' } },
          y: { ticks: { color: '#8888aa', font: { size: 10 } }, grid: { color: '#2a2a3a' } }
        }
      }
    });
  }

  scrollBottom();
}

async function sendMsg() {
  if (isLoading) return;
  const input = document.getElementById('input');
  const q = input.value.trim();
  if (!q) return;

  input.value = '';
  input.style.height = 'auto';
  isLoading = true;

  addUserMsg(q);
  history.push({ role: 'user', content: q });

  const stepInterval = addTyping();

  try {
    const r = await fetch(`${API}/api/ask`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: q }),
    });
    clearInterval(stepInterval);
    const data = await r.json();
    if (data.error) {
      addAiMsg(`❌ 出错了：${data.error}`, null);
    } else {
      addAiMsg(data.answer, data.meta);
      history.push({ role: 'assistant', content: data.answer });
    }
  } catch (err) {
    clearInterval(stepInterval);
    const typing = document.getElementById('typing');
    if (typing) typing.remove();
    addAiMsg(`❌ 无法连接后端。\n\n请确认已运行：\n\`\`\`\npython3 backend/main.py\n\`\`\``, null);
  }

  isLoading = false;
}
</script>
</body>
</html>
